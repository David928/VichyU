<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #5d5fef; --bg: #f8f9fe; --text: #2d3436; --heart-red: #ff4757; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* --- HEADER --- */
        .header { background: var(--primary); padding: 30px 20px 50px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; font-style: italic; }
        .search-bar { background: white; margin: 15px auto -70px; padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; position: relative; z-index: 10; }
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; }

        .container { padding: 85px 15px 10px; }

        /* --- PAGE CARTE --- */
        #map-page { display: none; height: 75vh; width: 100%; position: relative; }
        #map { height: 100%; width: 100%; border-radius: 25px; z-index: 1; }
        .locate-btn { position: absolute; bottom: 20px; right: 20px; z-index: 1002; background: white; border: none; width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* --- PAGE PROFIL --- */
        #profile-page { display: none; height: 70vh; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 0; }
        .profile-pic-container { position: relative; width: 90px; height: 90px; }
        #display-profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #eee; }
        .name-inputs { display: flex; flex-direction: column; gap: 5px; width: 80%; }
        .name-inputs input { border: none; background: transparent; text-align: center; font-size: 18px; font-weight: 800; color: var(--text); border-bottom: 1px solid #ddd; }
        .id-card-box { width: 100%; max-width: 320px; background: white; border-radius: 20px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #display-id-card { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; display: none; }
        .upload-id-btn { color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer; display: block; padding: 20px; border: 2px dashed #ccc; border-radius: 15px; text-align: center; }

        /* --- ACCUEIL --- */
        .ad-slider { display: flex !important; overflow-x: auto; gap: 12px; margin-bottom: 20px; padding: 5px 0; scrollbar-width: none; }
        .ad-banner { flex: 0 0 85%; border-radius: 25px; padding: 20px; color: white; display: flex; align-items: center; gap: 15px; }
        .categories { display: flex !important; gap: 10px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; padding: 5px 0; }
        .category-btn { flex: 0 0 85px; background: white; border: none; padding: 10px 5px; border-radius: 18px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .category-btn.active { background-color: var(--primary); color: white; }

        /* --- CARTES --- */
        .card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card-emoji { font-size: 28px; background: #f0f1ff; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; cursor: pointer; }
        .card-info { cursor: pointer; flex-grow: 1; }
        .btn-go { background: #f0f1ff; color: var(--primary); border: none; padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-top: 5px; cursor: pointer; }

        /* --- MODAL (FENÊTRE DÉTAILS) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 25px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #b2bec3; cursor: pointer; }

        /* --- NAV BAS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #b2bec3; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 18px; margin-bottom: 3px; }

        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 18px; color: #ddd; cursor: pointer; }
        .fav-btn.is-fav { color: var(--heart-red); }
        .hidden { display: none !important; }
        input[type="file"] { display: none; }
        
        /* Bouton dans la carte */
        .map-go-btn { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 8px; margin-top: 5px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="page-title">Vichy'U 🎓</h1>
        <div class="search-bar" id="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Rechercher...">
        </div>
    </div>

    <div class="container">
        <div id="map-page">
            <div id="map"></div>
            <button class="locate-btn" onclick="locateUser()"><i class="fa-solid fa-location-crosshairs"></i></button>
        </div>

        <div id="profile-page">
            <label for="profile-upload" class="profile-pic-container">
                <img id="display-profile-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </label>
            <input type="file" id="profile-upload" accept="image/*" onchange="handleImageUpload(event, 'profile')">
            <div class="name-inputs">
                <input type="text" id="userName" placeholder="Prénom" oninput="saveProfileData()">
                <input type="text" id="userSurname" placeholder="Nom" oninput="saveProfileData()">
            </div>
            <div class="id-card-box">
                <img id="display-id-card" src="">
                <label for="id-upload" id="label-id-upload" class="upload-id-btn">Photo Carte Étudiante</label>
                <input type="file" id="id-upload" accept="image/*" onchange="handleImageUpload(event, 'idcard')">
            </div>
        </div>

        <div id="main-content">
            <div id="ad-container" class="ad-slider">
                <div class="ad-banner" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);">
                    <div>🔥</div><div><h4>O'Tacos</h4><p>Le 3ème offert</p></div>
                </div>
                <div class="ad-banner" style="background: linear-gradient(135deg, #ff7675, #fab1a0);">
                    <div>🍕</div><div><h4>Le Daily</h4><p>Menu Lardy</p></div>
                </div>
            </div>

            <div class="categories" id="filter-container">
                <button class="category-btn active" onclick="filterByCat('tous', this)">🚀<span>Tous</span></button>
                <button class="category-btn" onclick="filterByCat('restos', this)">🍔<span>Restos</span></button>
                <button class="category-btn" onclick="filterByCat('loisirs', this)">🍿<span>Loisirs</span></button>
                <button class="category-btn" onclick="filterByCat('sport', this)">🏊<span>Sport</span></button>
            </div>

            <div id="deals-list">
                <div class="card" id="deal-1" data-cat="restos">
                    <div class="card-emoji" onclick="openDetails('Le Daily', '🍕', 'Formule Lardy : 8.50€ le menu complet étudiant.', 46.1218, 3.4278)">🍕</div>
                    <div class="card-info" onclick="openDetails('Le Daily', '🍕', 'Formule Lardy : 8.50€ le menu complet étudiant.', 46.1218, 3.4278)">
                        <h3>Le Daily</h3><p>8.50€ le menu Lardy</p>
                    </div>
                    <button class="btn-go" onclick="openMaps(46.1218, 3.4278)">Y aller</button>
                    <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-1')"></i>
                </div>
                <div class="card" id="deal-2" data-cat="restos">
                    <div class="card-emoji" onclick="openDetails('O\'Tacos', '🌮', 'Un Tacos M acheté, le 3ème offert sur présentation de l\'app.', 46.1250, 3.4220)">🌮</div>
                    <div class="card-info" onclick="openDetails('O\'Tacos', '🌮', 'Un Tacos M acheté, le 3ème offert sur présentation de l\'app.', 46.1250, 3.4220)">
                        <h3>O'Tacos</h3><p>Le 3ème offert !</p>
                    </div>
                    <button class="btn-go" onclick="openMaps(46.1250, 3.4220)">Y aller</button>
                    <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-2')"></i>
                </div>
            </div>
            <div id="empty-msg" class="hidden">Aucun favori... 💔</div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalEmoji" style="font-size: 50px; margin-bottom: 10px;"></div>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc" style="color: #636e72; line-height: 1.5; margin: 15px 0;"></p>
            <button id="modalGoBtn" class="map-go-btn" style="padding: 15px;">Y aller maintenant</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')"><i class="fa-solid fa-house"></i><span>Accueil</span></div>
        <div class="nav-item" id="nav-map" onclick="showPage('map')"><i class="fa-solid fa-map-location-dot"></i><span>Carte</span></div>
        <div class="nav-item" id="nav-fav" onclick="showPage('fav')"><i class="fa-solid fa-heart"></i><span>Favoris</span></div>
        <div class="nav-item" id="nav-profile" onclick="showPage('profile')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let userMarker;

        // --- NAVIGATION ---
        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            ['main-content', 'map-page', 'profile-page'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('search-container').style.display = 'flex';
            document.getElementById('empty-msg').classList.add('hidden');

            if (page === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('page-title').innerText = "Vichy'U 🎓";
                document.getElementById('ad-container').style.display = 'flex';
                document.getElementById('filter-container').style.display = 'flex';
            } else if (page === 'map') {
                document.getElementById('nav-map').classList.add('active');
                document.getElementById('map-page').style.display = 'block';
                document.getElementById('search-container').style.display = 'none';
                document.getElementById('page-title').innerText = "Carte 📍";
                setTimeout(() => { if (!map) initMap(); map.invalidateSize(); }, 200);
            } else if (page === 'fav') {
                document.getElementById('nav-fav').classList.add('active');
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('ad-container').style.display = 'none';
                document.getElementById('filter-container').style.display = 'none';
                updateFavView();
            } else if (page === 'profile') {
                document.getElementById('nav-profile').classList.add('active');
                document.getElementById('profile-page').style.display = 'flex';
                document.getElementById('search-container').style.display = 'none';
                document.getElementById('page-title').innerText = "Mon Profil";
            }
        }

        // --- DÉTAILS & GO ---
        function openDetails(title, emoji, desc, lat, lng) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalEmoji').innerText = emoji;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalGoBtn').onclick = () => openMaps(lat, lng);
            document.getElementById('detailModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        function openMaps(lat, lng) { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank'); }

        // --- CARTE ---
        function initMap() {
            map = L.map('map').setView([46.1215, 3.4275], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // Marqueurs avec bouton "Y aller"
            const points = [
                { name: "Le Daily", lat: 46.1218, lng: 3.4278 },
                { name: "O'Tacos", lat: 46.1250, lng: 3.4220 }
            ];
            points.forEach(p => {
                L.marker([p.lat, p.lng]).addTo(map)
                    .bindPopup(`<b>${p.name}</b><br><button class="map-go-btn" onclick="openMaps(${p.lat}, ${p.lng})">Y aller</button>`);
            });
        }

        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
            map.on('locationfound', (e) => {
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker(e.latlng, {radius: 8, fillColor: "#5d5fef", color: "white", weight: 2, fillOpacity: 1}).addTo(map);
            });
        }

        // --- PROFIL ---
        function handleImageUpload(e, type) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const b64 = reader.result;
                if (type === 'profile') {
                    document.getElementById('display-profile-pic').src = b64;
                    localStorage.setItem('user_profile_img', b64);
                } else {
                    document.getElementById('display-id-card').src = b64;
                    document.getElementById('display-id-card').style.display = 'block';
                    document.getElementById('label-id-upload').style.display = 'none';
                    localStorage.setItem('user_id_card_img', b64);
                }
            };
            if (file) reader.readAsDataURL(file);
        }

        function saveProfileData() {
            localStorage.setItem('user_firstname', document.getElementById('userName').value);
            localStorage.setItem('user_lastname', document.getElementById('userSurname').value);
        }

        // --- FILTRES & FAVS ---
        function filterByCat(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(c => {
                c.classList.toggle('hidden', cat !== 'tous' && c.dataset.cat !== cat);
            });
        }

        function toggleFavorite(id) {
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            if (favs.includes(id)) favs = favs.filter(i => i !== id);
            else favs.push(id);
            localStorage.setItem('vichyu_favs', JSON.stringify(favs));
            document.querySelector(`#${id} .fav-btn`).classList.toggle('is-fav');
            if(document.getElementById('nav-fav').classList.contains('active')) updateFavView();
        }

        function updateFavView() {
            const favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            let count = 0;
            document.querySelectorAll('.card').forEach(c => {
                const isF = favs.includes(c.id);
                c.classList.toggle('hidden', !isF);
                if (isF) count++;
            });
            document.getElementById('empty-msg').classList.toggle('hidden', count > 0);
        }

        window.onload = () => {
            document.getElementById('userName').value = localStorage.getItem('user_firstname') || "";
            document.getElementById('userSurname').value = localStorage.getItem('user_lastname') || "";
            if (localStorage.getItem('user_profile_img')) document.getElementById('display-profile-pic').src = localStorage.getItem('user_profile_img');
            if (localStorage.getItem('user_id_card_img')) {
                document.getElementById('display-id-card').src = localStorage.getItem('user_id_card_img');
                document.getElementById('display-id-card').style.display = 'block';
                document.getElementById('label-id-upload').style.display = 'none';
            }
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            favs.forEach(id => {
                const btn = document.querySelector(`#${id} .fav-btn`);
                if (btn) btn.classList.add('is-fav');
            });
        };
    </script>
</body>
</html>
