<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #5d5fef; --bg: #f8f9fe; --text: #2d3436; --heart-red: #ff4757; --verified: #00a8ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* --- HEADER --- */
        .header { background: var(--primary); padding: 30px 20px 50px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; font-style: italic; }
        .search-bar { background: white; margin: 15px auto -70px; padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; position: relative; z-index: 10; }
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; color: var(--text); }

        .container { padding: 85px 15px 10px; }

        /* --- PAGE PROFIL --- */
        #profile-page { display: none; flex-direction: column; align-items: center; gap: 15px; padding-top: 10px; }
        .profile-pic-container { position: relative; width: 150px; height: 150px; cursor: pointer; }
        #display-profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #eee; }
        .name-inputs { display: flex; flex-direction: column; gap: 8px; width: 85%; }
        .name-inputs input { border: none; background: transparent; text-align: center; font-size: 20px; font-weight: 800; color: var(--text); border-bottom: 2px solid #ddd; padding: 5px; }
        .id-card-box { width: 100%; max-width: 320px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-top: 5px; text-align: center; }
        #display-id-card { width: 100%; height: 180px; border-radius: 12px; object-fit: cover; display: none; margin-bottom: 15px; border: 1px solid #eee; cursor: zoom-in; }
        .upload-id-btn { color: var(--primary); font-size: 14px; font-weight: 700; cursor: pointer; display: block; padding: 15px; border: 2px dashed #5d5fef; border-radius: 15px; text-align: center; background: #fbfbff; }
        .share-btn { margin-top: 20px; background: white; color: var(--primary); border: 2px solid var(--primary); padding: 12px 25px; border-radius: 15px; font-weight: 800; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* --- CARTES & BADGE --- */
        .card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; }
        .card-emoji { font-size: 28px; background: #f0f1ff; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; }
        .card-info h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .card-info p { margin: 3px 0 0; color: #636e72; font-size: 13px; }
        .verified-badge { color: var(--verified); font-size: 14px; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; text-align: center; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #b2bec3; cursor: pointer; }
        .map-go-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .report-btn { margin-top: 15px; background: #fff1f2; color: #ff4757; border: none; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; width: 100%; }

        /* --- NAV BAS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #b2bec3; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 18px; margin-bottom: 3px; }
        
        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 18px; color: #ddd; cursor: pointer; z-index: 5; }
        .fav-btn.is-fav { color: var(--heart-red); }
        #zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        #zoom-overlay img { max-width: 95%; max-height: 80%; border-radius: 10px; }
        .hidden { display: none !important; }
        #map-page { display: none; height: 75vh; width: 100%; }
        #map { height: 100%; width: 100%; border-radius: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="page-title">Vichy'U 🎓</h1>
        <div class="search-bar" id="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Rechercher une offre...">
        </div>
    </div>

    <div class="container">
        <div id="profile-page">
            <label for="profile-upload" class="profile-pic-container">
                <img id="display-profile-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </label>
            <input type="file" id="profile-upload" accept="image/*" onchange="handleImageUpload(event, 'profile')">
            
            <div class="name-inputs">
                <input type="text" id="userName" placeholder="Prénom" oninput="saveProfileData()">
                <input type="text" id="userSurname" placeholder="Nom" oninput="saveProfileData()">
            </div>

            <div class="id-card-box">
                <h3 style="margin: 0 0 10px 0; color: var(--primary); font-size: 16px;">Ma carte étudiante</h3>
                <img id="display-id-card" src="" onclick="toggleZoom(true)">
                <label for="id-upload" class="upload-id-btn">
                    <i class="fa-solid fa-camera"></i><br>Ajouter/Modifier ma carte
                </label>
                <input type="file" id="id-upload" accept="image/*" onchange="handleImageUpload(event, 'idcard')">
            </div>
            <button class="share-btn" onclick="shareApp()"><i class="fa-solid fa-share-nodes"></i> Partager l'appli</button>
        </div>

        <div id="main-content">
            <div id="deals-list">
                <div class="card" id="deal-1" data-cat="restos" onclick="openDetails('Le Daily', '🍕', '8.50€ le menu complet (Plat + Dessert + Boisson) pour les étudiants.', 46.1218, 3.4278, true)">
                    <div class="card-emoji">🍕</div>
                    <div class="card-info">
                        <h3>Le Daily <i class="fa-solid fa-circle-check verified-badge"></i></h3>
                        <p>8.50€ le menu Lardy</p>
                    </div>
                    <i class="fa-solid fa-heart fav-btn" onclick="event.stopPropagation(); toggleFavorite('deal-1')"></i>
                </div>

                <div class="card" id="deal-2" data-cat="restos" onclick="openDetails('O\'Tacos', '🌮', 'Un Tacos M acheté, le 3ème offert sur présentation de ta carte.', 46.1250, 3.4220, true)">
                    <div class="card-emoji">🌮</div>
                    <div class="card-info">
                        <h3>O'Tacos <i class="fa-solid fa-circle-check verified-badge"></i></h3>
                        <p>Le 3ème offert !</p>
                    </div>
                    <i class="fa-solid fa-heart fav-btn" onclick="event.stopPropagation(); toggleFavorite('deal-2')"></i>
                </div>
            </div>
        </div>

        <div id="map-page">
            <div id="map"></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modalEmoji" style="font-size: 60px; margin-bottom: 15px;"></div>
            <h2 id="modalTitle" style="display:flex; align-items:center; justify-content:center; gap:8px;"></h2>
            <p id="modalDesc" style="color: #636e72; line-height: 1.5; margin: 20px 0;"></p>
            <button id="modalGoBtn" class="map-go-btn">Y aller maintenant</button>
            <button class="report-btn" onclick="reportIssue()">
                <i class="fa-solid fa-triangle-exclamation"></i> Signaler un problème
            </button>
        </div>
    </div>

    <div id="zoom-overlay" onclick="toggleZoom(false)"><img id="zoomed-image" src=""></div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')"><i class="fa-solid fa-house"></i><span>Accueil</span></div>
        <div class="nav-item" id="nav-map" onclick="showPage('map')"><i class="fa-solid fa-map-location-dot"></i><span>Carte</span></div>
        <div class="nav-item" id="nav-fav" onclick="showPage('fav')"><i class="fa-solid fa-heart"></i><span>Favoris</span></div>
        <div class="nav-item" id="nav-profile" onclick="showPage('profile')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let currentDealName = "";

        function openDetails(title, emoji, desc, lat, lng, verified) {
            currentDealName = title;
            document.getElementById('modalEmoji').innerText = emoji;
            document.getElementById('modalTitle').innerHTML = title + (verified ? ' <i class="fa-solid fa-circle-check verified-badge"></i>' : '');
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalGoBtn').onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank');
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

        function reportIssue() {
            const email = "ton-email@exemple.com"; 
            const subject = encodeURIComponent("Signalement Vichy'U : " + currentDealName);
            const body = encodeURIComponent("Bonjour,\n\nJe signale un problème sur : " + currentDealName + "\n\nPrécisions :");
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            ['main-content', 'map-page', 'profile-page'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('search-container').style.display = (page === 'home' || page === 'fav') ? 'flex' : 'none';

            if (page === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('page-title').innerText = "Vichy'U 🎓";
                updateFavView(false);
            } else if (page === 'map') {
                document.getElementById('nav-map').classList.add('active');
                document.getElementById('map-page').style.display = 'block';
                document.getElementById('page-title').innerText = "Carte 📍";
                setTimeout(() => { if(!map) initMap(); map.invalidateSize(); }, 200);
            } else if (page === 'fav') {
                document.getElementById('nav-fav').classList.add('active');
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('page-title').innerText = "Mes Favoris ❤️";
                updateFavView(true);
            } else if (page === 'profile') {
                document.getElementById('nav-profile').classList.add('active');
                document.getElementById('profile-page').style.display = 'flex';
                document.getElementById('page-title').innerText = "Mon Profil";
            }
        }

        function handleImageUpload(e, type) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onloadend = () => {
                const b64 = reader.result;
                if (type === 'profile') {
                    document.getElementById('display-profile-pic').src = b64;
                    localStorage.setItem('user_profile_img', b64);
                } else {
                    const imgEl = document.getElementById('display-id-card');
                    imgEl.src = b64; imgEl.style.display = 'block';
                    localStorage.setItem('user_id_card_img', b64);
                }
            };
            reader.readAsDataURL(file);
        }

        function saveProfileData() {
            localStorage.setItem('user_firstname', document.getElementById('userName').value);
            localStorage.setItem('user_lastname', document.getElementById('userSurname').value);
        }

        function toggleFavorite(id) {
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            if (favs.includes(id)) favs = favs.filter(i => i !== id);
            else favs.push(id);
            localStorage.setItem('vichyu_favs', JSON.stringify(favs));
            document.querySelector(`#${id} .fav-btn`).classList.toggle('is-fav');
        }

        function updateFavView(onlyFavs) {
            const favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            document.querySelectorAll('.card').forEach(c => {
                if (onlyFavs) c.classList.toggle('hidden', !favs.includes(c.id));
                else c.classList.remove('hidden');
            });
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: "Vichy'U 🎓", text: "Les meilleurs plans étudiants à Vichy !", url: window.location.href });
            }
        }

        function toggleZoom(show) {
            const overlay = document.getElementById('zoom-overlay');
            const originalImg = document.getElementById('display-id-card');
            if (show && originalImg.src) {
                document.getElementById('zoomed-image').src = originalImg.src;
                overlay.style.display = 'flex';
            } else { overlay.style.display = 'none'; }
        }

        function initMap() {
            map = L.map('map').setView([46.1215, 3.4275], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([46.1218, 3.4278]).addTo(map).bindPopup('Le Daily');
            L.marker([46.1250, 3.4220]).addTo(map).bindPopup('O\'Tacos');
        }

        window.onload = () => {
            document.getElementById('userName').value = localStorage.getItem('user_firstname') || "";
            document.getElementById('userSurname').value = localStorage.getItem('user_lastname') || "";
            if (localStorage.getItem('user_profile_img')) document.getElementById('display-profile-pic').src = localStorage.getItem('user_profile_img');
            if (localStorage.getItem('user_id_card_img')) {
                const imgEl = document.getElementById('display-id-card');
                imgEl.src = localStorage.getItem('user_id_card_img'); imgEl.style.display = 'block';
            }
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            favs.forEach(id => {
                const btn = document.querySelector(`#${id} .fav-btn`);
                if (btn) btn.classList.add('is-fav');
            });
        };
    </script>
</body>
</html>
