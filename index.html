<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5d5fef;
            --bg: #f8f9fe;
            --text: #2d3436;
            --heart-red: #ff4757;
        }

        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: var(--primary); padding: 30px 20px 50px; border-bottom-left-radius: 40px; color: white; text-align: center;}
        .container { padding: 20px 15px; }

        /* --- STYLES DES CARTES --- */
        .card { 
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            display: flex; align-items: center; gap: 15px; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card-info h3 { margin: 0; font-size: 16px; }
        .card-info p { margin: 5px 0 0; color: var(--primary); font-weight: bold; }

        /* --- BOUTON FAVORIS (CŒUR) --- */
        .fav-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            color: #ccc; /* Gris par défaut */
            transition: transform 0.2s;
            cursor: pointer;
        }
        .fav-btn.is-fav {
            color: var(--heart-red); /* Rouge quand c'est en favori */
        }
        .fav-btn:active { transform: scale(1.3); }

        /* --- NAV BAS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #b2bec3; font-size: 10px; cursor: pointer;}
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Vichy'U 🎓</h1>
    </div>

    <div class="container">
        <div id="deals-list">
            <div class="card" id="deal-1">
                <div style="font-size: 30px;">🍕</div>
                <div class="card-info">
                    <h3>Le Daily</h3>
                    <p>Formule Lardy : 8.50€</p>
                </div>
                <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-1')"></i>
            </div>

            <div class="card" id="deal-2">
                <div style="font-size: 30px;">🧗</div>
                <div class="card-info">
                    <h3>Vertical Limit</h3>
                    <p>Accès réduit étudiant</p>
                </div>
                <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-2')"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Accueil</span></div>
        <div class="nav-item"><i class="fa-solid fa-heart"></i><span>Mes Favoris</span></div>
    </nav>

    <script>
        // Fonction pour activer/désactiver un favori
        function toggleFavorite(dealId) {
            const heartIcon = document.querySelector(`#${dealId} .fav-btn`);
            
            // 1. Récupérer la liste actuelle des favoris dans le téléphone
            let favorites = JSON.parse(localStorage.getItem('vichyu_favs')) || [];

            if (favorites.includes(dealId)) {
                // Si déjà en favori, on l'enlève
                favorites = favorites.filter(id => id !== dealId);
                heartIcon.classList.remove('is-fav');
            } else {
                // Sinon, on l'ajoute
                favorites.push(dealId);
                heartIcon.classList.add('is-fav');
            }

            // 2. Sauvegarder la nouvelle liste dans le téléphone
            localStorage.setItem('vichyu_favs', JSON.stringify(favorites));
        }

        // Fonction pour charger les favoris au démarrage
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            
            favorites.forEach(dealId => {
                const heartIcon = document.querySelector(`#${dealId} .fav-btn`);
                if (heartIcon) {
                    heartIcon.classList.add('is-fav');
                }
            });
        }

        // Lancer le chargement au démarrage
        window.onload = loadFavorites;
    </script>
</body>
</html>
