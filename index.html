<!DOCTYPE html> 
<html lang="fr"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Vichy'U</title> 
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> 
    <style> 
        :root {  
            --primary: #4d52e1; --bg: #f8f9fe; --card-bg: #ffffff;  
            --text: #2d3436; --text-light: #636e72; --border: #eee; 
            --heart-red: #ff4757; --verified: #00a8ff; --green: #00b894; 
        } 
        body.dark {  
            --bg: #121212; --card-bg: #1e1e1e; --text: #f5f5f5;  
            --text-light: #b2bec3; --border: #333;  
        } 

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } 
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; } 

        .header { background: var(--primary); padding: 5px 20px 45px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; text-align: center; position: relative; } 
        /* FIX LOGO XXL */
        .header-logo { height: 160px; width: auto; max-width: 100%; margin: 0 auto; display: block; object-fit: contain; }
        
        .theme-toggle { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; } 

        .search-bar { background: white; margin: 10px auto -35px; padding: 12px 15px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; position: relative; z-index: 100; } 
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; background: transparent; color: #2d3436; } 
        body.dark .search-bar { background: #2d2d2d; } 
        body.dark .search-bar input { color: white; } 

        .container { padding: 45px 15px 10px; } 
        .ad-slider { display: flex; overflow-x: auto; gap: 12px; margin-bottom: 25px; scrollbar-width: none; padding: 10px 0; } 
        .ad-banner { flex: 0 0 85%; border-radius: 25px; min-height: 120px; padding: 20px; color: white; display: flex; align-items: center; gap: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); } 

        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; } 
        .cat-item { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 2px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; } 
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); } 

        .card { background: var(--card-bg); border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; border: 1px solid var(--border); cursor: pointer; } 
        .card-emoji { font-size: 26px; background: rgba(77, 82, 225, 0.1); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; } 
        .card-info h3 { margin: 0; font-size: 15px; } 
        .card-info p { margin: 3px 0; color: var(--text-light); font-size: 12px; } 
        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 22px; color: #ddd; transition: color 0.3s; } 
        .fav-btn.is-fav { color: var(--heart-red); } 

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; } 
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 11px; flex: 1; cursor: pointer; } 
        .nav-item.active { color: var(--primary); } 

        #map-page, #profile-page, #agenda-page { display: none; } 
        #profile-page { flex-direction: column; align-items: center; } 
        #map { height: 75vh; width: 100%; border-radius: 25px; } 
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; padding: 20px; } 
        .modal-content { background: var(--card-bg); width: 100%; max-width: 380px; border-radius: 30px; padding: 30px; text-align: center; position: relative; } 
        
        /* RESTAURATION BUDGET PROFIL */
        .budget-container { width: 100%; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; } 
        .budget-widget { background: var(--green); color: white; padding: 15px; border-radius: 20px; text-align: center; } 
        .budget-amount { font-size: 24px; font-weight: 900; display: block; } 
        .budget-sub { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 15px; display: flex; justify-content: space-around; font-size: 12px; } 
        .budget-sub b { display: block; color: var(--green); font-size: 14px; } 

        #zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; } 
        #zoom-overlay img { max-width: 90%; border-radius: 10px; } 
        .hidden { display: none !important; } 
    </style> 
</head> 
<body> 

    <div class="header"> 
        <div class="theme-toggle" onclick="toggleTheme()"><i id="theme-icon" class="fa-solid fa-moon"></i></div> 
        <img src="logo.png" alt="Vichy'U" class="header-logo"> 
        <div class="search-bar" id="search-container"> 
            <i class="fa-solid fa-magnifying-glass"></i> 
            <input type="text" id="searchInput" placeholder="Rechercher un bon plan..." oninput="searchDeals()"> 
        </div> 
    </div> 

    <div class="container"> 
        <div id="main-content"> 
            <div class="ad-slider"> 
                <div class="ad-banner" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);"> 
                    <div style="font-size:45px">🔥</div><div><h4>O'Tacos</h4><p style="margin:0;opacity:0.9">Le 3ème offert aujourd'hui !</p></div> 
                </div> 
            </div> 

            <div class="categories-grid"> 
                <div class="cat-item active" onclick="filterCat('tous', this)"><i class="fa-solid fa-rocket"></i>Tous</div> 
                <div class="cat-item" onclick="filterCat('restos', this)"><i class="fa-solid fa-burger"></i>Restos</div> 
                <div class="cat-item" onclick="filterCat('loisirs', this)"><i class="fa-solid fa-film"></i>Loisirs</div> 
                <div class="cat-item" onclick="filterCat('fav', this)"><i class="fa-solid fa-heart"></i>Favs</div> 
            </div> 

            <div id="deals-list"> 
                <div class="card" data-cat="loisirs" onclick="openDetails('Le parcours ninja', '🥷', 'Économise 4€', 46.1149, 3.4373, 4, 'Un parcours d\'obstacles épique pour tester ton agilité ! Profite de 8€ au lieu de 12€.')"> 
                    <div class="card-emoji">🥷</div><div class="card-info"><h3>Le parcours ninja</h3><p>Économise 4€</p></div> 
                    <i class="fa-solid fa-heart fav-btn" id="f1" onclick="event.stopPropagation(); toggleFav('f1')"></i> 
                </div> 
                <div class="card" data-cat="restos" onclick="openDetails('O\'Tacos', '🌮', '3ème Tacos offert', 46.1250, 3.4220, 5, 'Valable sur présentation de l\'application. Pour deux tacos achetés, le troisième est gratuit !')"> 
                    <div class="card-emoji">🌮</div><div class="card-info"><h3>O'Tacos</h3><p>Économise 5€</p></div> 
                    <i class="fa-solid fa-heart fav-btn" id="f2" onclick="event.stopPropagation(); toggleFav('f2')"></i> 
                </div> 
            </div> 
        </div> 

        <div id="map-page"><div id="map"></div></div> 

        <div id="profile-page"> 
            <div class="budget-container"> 
                <div class="budget-widget">
                    <span>ÉCONOMIES TOTALES 💰</span>
                    <span class="budget-amount" id="total-saved">0.00 €</span>
                </div> 
                <div class="budget-sub">
                    <div style="text-align:center">MOIS <b id="month-saved">0.00 €</b></div>
                    <div style="text-align:center">ANNÉE <b id="year-saved">0.00 €</b></div>
                </div> 
            </div> 

            <label for="p-up"><img id="p-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:110px;height:110px;border-radius:50%;border:4px solid var(--primary);object-fit:cover;"></label> 
            <input type="file" id="p-up" hidden accept="image/*" onchange="upImg(event,'p')"> 
            
            <input type="text" id="fn" placeholder="Ton Prénom" oninput="sv()" style="width:100%; padding:15px; margin:20px 0; border-radius:15px; border:1px solid var(--border); text-align:center; font-weight:bold;"> 
            
            <div style="background:var(--card-bg); padding:15px; border-radius:20px; border:1px solid var(--border); width:100%; text-align:center;"> 
                <img id="id-img" onclick="zoomID(true)" style="width:100%; height:160px; object-fit:cover; border-radius:12px; display:none; margin-bottom:10px; cursor:zoom-in;"> 
                <label for="id-up" style="color:var(--primary); font-weight:bold; cursor:pointer;"><i class="fa-solid fa-camera"></i> Ma carte étudiante</label> 
                <input type="file" id="id-up" hidden accept="image/*" onchange="upImg(event,'id')"> 
            </div> 
            <button style="background:var(--primary); color:white; border:none; padding:18px; border-radius:20px; font-weight:800; width:100%; margin-top:20px; cursor:pointer;" onclick="shareApp()">PARTAGER L'APPLI</button> 
        </div> 
    </div> 

    <div id="detailModal" class="modal"> 
        <div class="modal-content"> 
            <span style="position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;" onclick="closeM()">×</span> 
            <div id="mEmoji" style="font-size:60px;margin-bottom:10px"></div> 
            <h2 id="mTitle"></h2> 
            <p id="mOffer" style="color:var(--primary); font-weight:bold; margin: 0;"></p>
            <p id="mDesc" style="color:var(--text-light); margin:15px 0; white-space: pre-line; font-size: 14px;"></p> 
            <button id="mGo" style="background:var(--primary); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; width:100%; font-size:16px; cursor:pointer;"></button> 
        </div> 
    </div> 
    <div id="zoom-overlay" onclick="zoomID(false)"><img id="zImg" src=""></div> 

    <nav class="bottom-nav"> 
        <div class="nav-item active" onclick="go('home', this)"><i class="fa-solid fa-house"></i>Accueil</div> 
        <div class="nav-item" onclick="go('map', this)"><i class="fa-solid fa-map-location-dot"></i>Carte</div> 
        <div class="nav-item" onclick="go('profile', this)"><i class="fa-solid fa-user"></i>Profil</div> 
    </nav> 

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
    <script> 
        let map, userMarker, markers = []; 
        let totalSaved = parseFloat(localStorage.getItem('saved_total')) || 0; 

        function initMap() { 
            if (!map) { 
                map = L.map('map').setView([46.123, 3.425], 14); 
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); 
                map.locate({setView: false, watch: true}); 
                map.on('locationfound', (e) => { 
                    if (userMarker) userMarker.setLatLng(e.latlng); 
                    else userMarker = L.circleMarker(e.latlng, {radius: 8, fillColor: "#4d52e1", color: "#fff", weight: 2, fillOpacity: 1}).addTo(map); 
                }); 
                document.querySelectorAll('.card').forEach(card => {
                    const title = card.querySelector('h3').innerText;
                    const emoji = card.querySelector('.card-emoji').innerText;
                    const onclickStr = card.getAttribute('onclick');
                    const coords = onclickStr.match(/(\d+\.\d+),\s*(\d+\.\d+)/);
                    if(coords) L.marker([parseFloat(coords[1]), parseFloat(coords[2])]).addTo(map).bindPopup(emoji + " " + title);
                });
            } 
        } 

        function updateSaved(amount) { 
            totalSaved += amount; 
            localStorage.setItem('saved_total', totalSaved); 
            const val = totalSaved.toFixed(2) + " €";
            ['total-saved', 'month-saved', 'year-saved'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = val; }); 
        } 

        function go(p, el) { 
            const navItems = document.querySelectorAll('.nav-item'); navItems.forEach(i => i.classList.remove('active')); if(el) el.classList.add('active'); 
            ['main-content', 'map-page', 'profile-page'].forEach(id => document.getElementById(id).style.display = 'none'); 
            document.getElementById('search-container').style.display = (p === 'home') ? 'flex' : 'none'; 
            if(p==='home') document.getElementById('main-content').style.display='block'; 
            if(p==='map') { document.getElementById('map-page').style.display='block'; setTimeout(initMap, 200); } 
            if(p==='profile') { document.getElementById('profile-page').style.display='flex'; updateSaved(0); } 
        } 

        function openDetails(title, emoji, offer, lat, lng, saving, desc) { 
            document.getElementById('mEmoji').innerText = emoji; 
            document.getElementById('mTitle').innerText = title; 
            document.getElementById('mOffer').innerText = offer;
            document.getElementById('mDesc').innerText = desc || ""; 
            document.getElementById('mGo').innerText = "Y aller maintenant"; 
            document.getElementById('mGo').onclick = () => {  
                if(saving > 0) updateSaved(saving); 
                // OUVERTURE MAPS SANS PAGE BLANCHE
                window.location.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            }; 
            document.getElementById('detailModal').style.display = 'flex'; 
        } 

        function closeM() { document.getElementById('detailModal').style.display = 'none'; } 
        function upImg(e, type) { 
            const reader = new FileReader(); 
            reader.onload = (event) => { 
                if (type === 'p') { document.getElementById('p-img').src = event.target.result; localStorage.setItem('p_i', event.target.result); } 
                else { document.getElementById('id-img').src = event.target.result; document.getElementById('id-img').style.display = 'block'; localStorage.setItem('id_i', event.target.result); } 
            }; 
            reader.readAsDataURL(e.target.files[0]); 
        } 
        function zoomID(s) { if(s && document.getElementById('id-img').src){ document.getElementById('zImg').src=document.getElementById('id-img').src; document.getElementById('zoom-overlay').style.display='flex'; } else { document.getElementById('zoom-overlay').style.display='none'; } } 
        function sv() { localStorage.setItem('u_f', document.getElementById('fn').value); } 
        function shareApp() { if(navigator.share) navigator.share({title:"Vichy'U", url:window.location.href}); } 

        window.onload = () => { 
            if(localStorage.getItem('th') === 'true') document.body.classList.add('dark'); 
            document.getElementById('fn').value = localStorage.getItem('u_f') || ""; 
            if(localStorage.getItem('p_i')) document.getElementById('p-img').src = localStorage.getItem('p_i'); 
            if(localStorage.getItem('id_i')) { document.getElementById('id-img').src = localStorage.getItem('id_i'); document.getElementById('id-img').style.display = 'block'; } 
            updateSaved(0); 
        }; 
    </script> 
</body> 
</html>
