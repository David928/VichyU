<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Vichy'U - Bons Plans Étudiants</title>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-btn { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        .hidden-card { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto bg-gray-50 min-h-screen relative pb-24 shadow-2xl">
        <header class="bg-indigo-600 text-white p-8 rounded-b-[40px] shadow-lg">
            <h1 class="text-3xl font-black italic tracking-tighter">Vichy'U 🎓</h1>
            <div class="mt-6 relative text-gray-800">
                <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Burger, Ciné, Salle de sport..." 
                    class="w-full p-4 pl-12 rounded-2xl focus:outline-none shadow-xl border-none text-sm">
                <span class="absolute left-4 top-3.5 text-xl">🔍</span>
            </div>
        </header>

        <div class="flex overflow-x-auto p-4 gap-3 no-scrollbar mt-2">
            <button onclick="filterCategory('Tous', this)" class="cat-filter px-6 py-2.5 rounded-2xl bg-indigo-600 text-white text-xs font-bold active-btn flex-shrink-0 shadow-md">🚀 Tous</button>
            <button onclick="filterCategory('Resto', this)" class="cat-filter px-6 py-2.5 rounded-2xl bg-white text-gray-600 border border-gray-100 text-xs font-bold flex-shrink-0 shadow-sm">🍔 Restos</button>
            <button onclick="filterCategory('Loisirs', this)" class="cat-filter px-6 py-2.5 rounded-2xl bg-white text-gray-600 border border-gray-100 text-xs font-bold flex-shrink-0 shadow-sm">🍿 Loisirs</button>
            <button onclick="filterCategory('Sport', this)" class="cat-filter px-6 py-2.5 rounded-2xl bg-white text-gray-600 border border-gray-100 text-xs font-bold flex-shrink-0 shadow-sm">🏊 Sport</button>
        </div>

        <main id="offersList" class="p-4 space-y-4">
            <div class="offer-card bg-white p-5 rounded-[25px] shadow-sm flex items-center gap-5" data-category="Resto">
                <div class="text-3xl">🍕</div>
                <div class="flex-1">
                    <h3 class="font-extrabold text-gray-800 title">Le Daily</h3>
                    <p class="text-indigo-600 font-bold text-sm">Formule Lardy : 8.50€</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function filterCards() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('offer-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.title').innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "flex" : "none";
            }
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.cat-filter').forEach(b => b.classList.remove('active-btn', 'bg-indigo-600', 'text-white'));
            btn.classList.add('active-btn');
            let cards = document.getElementsByClassName('offer-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = (cat === 'Tous' || cards[i].getAttribute('data-category') === cat) ? "flex" : "none";
            }
        }

        // Script pour enregistrer la PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
