<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #5d5fef; --bg: #f8f9fe; --card-bg: #ffffff; 
            --text: #2d3436; --text-light: #636e72; --border: #eee;
            --heart-red: #ff4757; --verified: #00a8ff; --green: #00b894;
        }
        body.dark { 
            --bg: #121212; --card-bg: #1e1e1e; --text: #f5f5f5; 
            --text-light: #b2bec3; --border: #333; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }

        /* --- HEADER --- */
        .header { background: var(--primary); padding: 30px 20px 50px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; font-style: italic; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .search-bar { background: white; margin: 15px auto -70px; padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; position: relative; z-index: 10; }
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; background: transparent; color: inherit; }
        body.dark .search-bar { background: #2d2d2d; color: white; }

        .container { padding: 85px 15px 10px; }

        /* --- NOTIFICATION --- */
        #notif-daily { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 15px 20px; border-radius: 20px; width: 90%; max-width: 350px; z-index: 5000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #notif-daily.show { top: 20px; }

        /* --- BUDGET SAVED WIDGET --- */
        .budget-widget { background: var(--green); color: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 15px rgba(0, 184, 148, 0.2); }
        .budget-amount { font-size: 32px; font-weight: 900; display: block; margin: 5px 0; }

        /* --- CATEGORIES GRID --- */
        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .cat-item { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 2px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- CARTES --- */
        .card { background: var(--card-bg); border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; border: 1px solid var(--border); cursor: pointer; }
        .card-emoji { font-size: 26px; background: rgba(93, 95, 239, 0.1); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .card-info h3 { margin: 0; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .verified-badge { color: var(--verified); font-size: 13px; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 380px; border-radius: 30px; padding: 30px; text-align: center; position: relative; }
        
        #zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 6000; justify-content: center; align-items: center; }
        #zoom-overlay img { max-width: 95%; max-height: 80%; border-radius: 10px; border: 2px solid white; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        .hidden { display: none !important; }
        #map-page, #profile-page { display: none; }
        #map { height: 70vh; width: 100%; border-radius: 25px; }
        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 22px; color: #ddd; }
        .fav-btn.is-fav { color: var(--heart-red); }
        .share-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 16px; width: 90%; margin: 10px auto; display: block; cursor: pointer; }
    </style>
</head>
<body>

    <div id="notif-daily">
        <div style="font-size: 24px;">🎁</div>
        <div>
            <b style="display:block; font-size:14px;">Bon plan du jour !</b>
            <span style="font-size:12px;">Économise jusqu'à 5€ sur ton menu !</span>
        </div>
    </div>

    <div class="header">
        <div class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></div>
        <h1>Vichy'U 🎓</h1>
        <div class="search-bar" id="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="searchDeals()">
        </div>
    </div>

    <div class="container">
        <div id="main-content">
            <div class="categories-grid">
                <div class="cat-item active" onclick="filterCat('tous', this)"><i class="fa-solid fa-rocket"></i>Tous</div>
                <div class="cat-item" onclick="filterCat('restos', this)"><i class="fa-solid fa-burger"></i>Restos</div>
                <div class="cat-item" onclick="filterCat('loisirs', this)"><i class="fa-solid fa-film"></i>Loisirs</div>
                <div class="cat-item" onclick="filterCat('sport', this)"><i class="fa-solid fa-swimmer"></i>Sport</div>
            </div>

            <div id="deals-list">
                <div class="card" data-cat="restos" data-save="2.50" onclick="openDetails('Le Daily', '🍕', '8.50€ le menu complet.', 46.1218, 3.4278, true, 2.50)">
                    <div class="card-emoji">🍕</div>
                    <div class="card-info"><h3>Le Daily <i class="fa-solid fa-circle-check verified-badge"></i></h3><p>Économise ~2.50€</p></div>
                    <i class="fa-solid fa-heart fav-btn" id="f1" onclick="event.stopPropagation(); toggleFav('f1')"></i>
                </div>
                <div class="card" data-cat="restos" data-save="4.00" onclick="openDetails('O\'Tacos', '🌮', '3ème Tacos offert.', 46.1250, 3.4220, true, 4.00)">
                    <div class="card-emoji">🌮</div>
                    <div class="card-info"><h3>O'Tacos <i class="fa-solid fa-circle-check verified-badge"></i></h3><p>Économise ~4.00€</p></div>
                    <i class="fa-solid fa-heart fav-btn" id="f2" onclick="event.stopPropagation(); toggleFav('f2')"></i>
                </div>
                <div class="card" data-cat="loisirs" data-save="3.00" onclick="openDetails('CGR Cinéma', '🍿', 'Place de ciné à 7€.', 46.1221, 3.4215, true, 3.00)">
                    <div class="card-emoji">🍿</div>
                    <div class="card-info"><h3>CGR Cinéma <i class="fa-solid fa-circle-check verified-badge"></i></h3><p>Économise ~3.00€</p></div>
                    <i class="fa-solid fa-heart fav-btn" id="f3" onclick="event.stopPropagation(); toggleFav('f3')"></i>
                </div>
            </div>
        </div>

        <div id="map-page"><div id="map"></div></div>

        <div id="profile-page">
            <div class="budget-widget">
                <span style="font-size: 14px; opacity: 0.9;">Argent total économisé</span>
                <span class="budget-amount" id="total-saved">0.00 €</span>
                <span style="font-size: 11px;">Continue comme ça ! 🚀</span>
            </div>

            <div style="text-align: center;">
                <label for="p-up"><img id="p-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px;height:100px;border-radius:50%;border:3px solid var(--primary);object-fit:cover;"></label>
                <input type="file" id="p-up" hidden onchange="upImg(event,'p')">
                <div style="display:flex;flex-direction:column;gap:10px;margin:15px 0;">
                    <input type="text" id="fn" placeholder="Prénom" oninput="sv()" style="padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card-bg);color:var(--text)">
                </div>
            </div>

            <div style="background:var(--card-bg);padding:15px;border-radius:20px;border:1px solid var(--border);text-align:center;">
                <img id="id-img" onclick="zoomID(true)" style="width:100%;height:150px;object-fit:cover;border-radius:12px;display:none;margin-bottom:10px;cursor:zoom-in;">
                <label for="id-up" style="color:var(--primary);font-weight:800;cursor:pointer;font-size:14px;"><i class="fa-solid fa-camera"></i> Ma carte étudiante</label>
                <input type="file" id="id-up" hidden onchange="upImg(event,'id')">
            </div>
            <button class="share-btn" onclick="shareApp()"><i class="fa-solid fa-share-nodes"></i> PARTAGER</button>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;color:var(--text-light)" onclick="closeM()">×</span>
            <div id="mEmoji" style="font-size:60px;margin-bottom:10px"></div>
            <h2 id="mTitle" style="margin:0;"></h2>
            <p id="mDesc" style="color:var(--text-light);margin:20px 0"></p>
            <button id="mGo" style="background:var(--primary);color:white;border:none;padding:15px;border-radius:15px;font-weight:bold;width:100%;font-size:16px;cursor:pointer;">Y aller maintenant</button>
        </div>
    </div>

    <div id="zoom-overlay" onclick="zoomID(false)"><img id="zImg" src=""></div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="n-h" onclick="go('home')"><i class="fa-solid fa-house"></i>Accueil</div>
        <div class="nav-item" id="n-m" onclick="go('map')"><i class="fa-solid fa-map-location-dot"></i>Carte</div>
        <div class="nav-item" id="n-p" onclick="go('profile')"><i class="fa-solid fa-user"></i>Profil</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, curT = "", curSaveValue = 0;

        function searchDeals() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                let title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            });
        }

        function zoomID(show) {
            if(show && document.getElementById('id-img').src) {
                document.getElementById('zImg').src = document.getElementById('id-img').src;
                document.getElementById('zoom-overlay').style.display = 'flex';
            } else { document.getElementById('zoom-overlay').style.display = 'none'; }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            let isDark = document.body.classList.contains('dark');
            document.querySelector('.theme-toggle i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function go(p) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            ['main-content', 'map-page', 'profile-page'].forEach(id => document.getElementById(id).style.display = 'none');
            if(p==='home'){document.getElementById('n-h').classList.add('active');document.getElementById('main-content').style.display='block';}
            if(p==='map'){document.getElementById('n-m').classList.add('active');document.getElementById('map-page').style.display='block';setTimeout(initMap,200);}
            if(p==='profile'){document.getElementById('n-p').classList.add('active');document.getElementById('profile-page').style.display='block'; updateBudgetDisplay();}
        }

        function openDetails(t, e, d, lat, lng, v, saveAmt) {
            curT = t; curSaveValue = saveAmt;
            document.getElementById('mEmoji').innerText = e;
            document.getElementById('mTitle').innerHTML = t + (v ? ' <i class="fa-solid fa-circle-check" style="color:#00a8ff"></i>' : '');
            document.getElementById('mDesc').innerText = d;
            document.getElementById('mGo').onclick = () => {
                addToBudget(curSaveValue);
                window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`);
            };
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeM() { document.getElementById('detailModal').style.display = 'none'; }

        // LOGIQUE DU COMPTEUR
        function addToBudget(amt) {
            let current = parseFloat(localStorage.getItem('saved_budget')) || 0;
            current += parseFloat(amt);
            localStorage.setItem('saved_budget', current.toFixed(2));
            // Petite alerte visuelle
            alert(`Bravo ! Tu viens d'économiser ${amt} € ! Retrouve ton total dans ton profil.`);
            closeM();
        }

        function updateBudgetDisplay() {
            let total = parseFloat(localStorage.getItem('saved_budget')) || 0;
            document.getElementById('total-saved').innerText = total.toFixed(2) + " €";
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([46.123, 3.425], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function toggleFav(id) {
            let f = JSON.parse(localStorage.getItem('f')) || [];
            if(f.includes(id)) f = f.filter(x => x !== id); else f.push(id);
            localStorage.setItem('f', JSON.stringify(f));
            document.getElementById(id).classList.toggle('is-fav');
        }

        function upImg(e,t) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onloadend = () => {
                if(t==='p'){document.getElementById('p-img').src=r.result;localStorage.setItem('p_i',r.result);}
                else{const i=document.getElementById('id-img');i.src=r.result;i.style.display='block';localStorage.setItem('id_i',r.result);}
            }; r.readAsDataURL(f);
        }

        function sv(){ localStorage.setItem('f_n',document.getElementById('fn').value); }
        function shareApp(){ if(navigator.share) navigator.share({title:"Vichy'U", text:"Regarde combien j'économise à Vichy !", url:window.location.href}); }

        window.onload = () => {
            if(localStorage.getItem('theme')==='dark') toggleTheme();
            document.getElementById('fn').value = localStorage.getItem('f_n') || "";
            if(localStorage.getItem('p_i')) document.getElementById('p-img').src = localStorage.getItem('p_i');
            if(localStorage.getItem('id_i')){const i=document.getElementById('id-img');i.src=localStorage.getItem('id_i');i.style.display='block';}
            updateBudgetDisplay();
            setTimeout(() => { document.getElementById('notif-daily').classList.add('show'); }, 1000);
            setTimeout(() => { document.getElementById('notif-daily').classList.remove('show'); }, 5000);
        };
    </script>
</body>
</html>
