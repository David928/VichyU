<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #5d5fef; --bg: #f8f9fe; --card-bg: #ffffff; 
            --text: #2d3436; --text-light: #636e72; --border: #eee;
            --heart-red: #ff4757; --verified: #00a8ff; --green: #00b894; --star: #fdcb6e;
        }
        body.dark { 
            --bg: #121212; --card-bg: #1e1e1e; --text: #f5f5f5; 
            --text-light: #b2bec3; --border: #333; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }

        .header { background: var(--primary); padding: 30px 20px 50px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; font-style: italic; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; }

        .search-bar { background: white; margin: 15px auto -30px; padding: 12px 15px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; position: relative; z-index: 100; }
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; background: transparent; color: #2d3436; }
        body.dark .search-bar { background: #2d2d2d; }
        body.dark .search-bar input { color: white; }

        .container { padding: 45px 15px 10px; }

        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .cat-item { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 2px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: var(--card-bg); border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; border: 1px solid var(--border); cursor: pointer; }
        .card-emoji { font-size: 26px; background: rgba(93, 95, 239, 0.1); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .card-info h3 { margin: 0; font-size: 15px; }
        .card-info p { margin: 3px 0; color: var(--text-light); font-size: 12px; }
        
        .rating-badge { font-size: 11px; color: var(--star); font-weight: bold; margin-top: 2px; }

        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 22px; color: #ddd; transition: color 0.3s; }
        .fav-btn.is-fav { color: var(--heart-red); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 380px; border-radius: 30px; padding: 30px; text-align: center; position: relative; }
        
        .star-rating { margin: 15px 0 5px; font-size: 25px; color: #ddd; }
        .star-rating i { cursor: pointer; padding: 0 5px; }
        .star-rating i.active { color: var(--star); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        #map-page, #profile-page { display: none; }
        #map { height: 70vh; width: 100%; border-radius: 25px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="theme-toggle" onclick="toggleTheme()"><i id="theme-icon" class="fa-solid fa-moon"></i></div>
        <h1>Vichy'U</h1>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un bon plan..." oninput="searchDeals()">
        </div>
    </div>

    <div class="container">
        <div id="main-content">
            <div class="categories-grid">
                <div class="cat-item active" onclick="filterCat('tous', this)"><i class="fa-solid fa-rocket"></i>Tous</div>
                <div class="cat-item" onclick="filterCat('restos', this)"><i class="fa-solid fa-burger"></i>Restos</div>
                <div class="cat-item" onclick="filterCat('loisirs', this)"><i class="fa-solid fa-film"></i>Loisirs</div>
                <div class="cat-item" onclick="filterCat('sport', this)"><i class="fa-solid fa-swimmer"></i>Sport</div>
                <div class="cat-item" onclick="filterCat('fav', this)"><i class="fa-solid fa-heart"></i>Favs</div>
            </div>

            <div id="deals-list">
                <div class="card" data-cat="loisirs" onclick="openDetails('Le parcours ninja', '🥷', '8€ par ninja', 46.1149, 3.4373, 4, 'f1', 'Viens tester ton agilité sur notre nouveau parcours inspiré de Ninja Warrior !')">
                    <div class="card-emoji">🥷</div>
                    <div class="card-info">
                        <h3>Le parcours ninja</h3>
                        <p>Économise 4€</p>
                        <div class="rating-badge" id="rate-f1"><i class="fa-solid fa-star"></i> <span>4.5</span></div>
                    </div>
                    <i class="fa-solid fa-heart fav-btn" id="f1" onclick="event.stopPropagation(); toggleFav('f1')"></i>
                </div>

                <div class="card" data-cat="restos" onclick="openDetails('O\'Tacos', '🌮', '3ème Tacos offert.', 46.1250, 3.4220, 5, 'f2', 'Le rendez-vous incontournable pour les grosses faims étudiant.')">
                    <div class="card-emoji">🌮</div>
                    <div class="card-info">
                        <h3>O'Tacos</h3>
                        <p>Économise 5.00€</p>
                        <div class="rating-badge" id="rate-f2"><i class="fa-solid fa-star"></i> <span>4.2</span></div>
                    </div>
                    <i class="fa-solid fa-heart fav-btn" id="f2" onclick="event.stopPropagation(); toggleFav('f2')"></i>
                </div>

                <div class="card" data-cat="loisirs" onclick="openDetails('CGR Vichy', '🍿', 'La place de ciné à 7€.', 46.1221, 3.4215, 4, 'f3', 'Tous les films à l\'affiche toute l\'année sur présentation du pass.')">
                    <div class="card-emoji">🍿</div>
                    <div class="card-info">
                        <h3>CGR Vichy</h3>
                        <p>Économise 4.00€</p>
                        <div class="rating-badge" id="rate-f3"><i class="fa-solid fa-star"></i> <span>4.0</span></div>
                    </div>
                    <i class="fa-solid fa-heart fav-btn" id="f3" onclick="event.stopPropagation(); toggleFav('f3')"></i>
                </div>
            </div>
        </div>

        <div id="map-page"><div id="map"></div></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;" onclick="closeM()">×</span>
            <div id="mEmoji" style="font-size:60px; margin-bottom:10px;"></div>
            <h2 id="mTitle" style="margin:5px 0;"></h2>
            <p id="mDesc" style="font-weight:bold; color:var(--primary); margin-bottom:10px;"></p>
            <p id="mIntro" style="color:var(--text-light); font-size:14px; margin-bottom:15px;"></p>
            
            <div class="star-rating" id="modalStars">
                <i class="fa-solid fa-star" onclick="submitRate(1)"></i>
                <i class="fa-solid fa-star" onclick="submitRate(2)"></i>
                <i class="fa-solid fa-star" onclick="submitRate(3)"></i>
                <i class="fa-solid fa-star" onclick="submitRate(4)"></i>
                <i class="fa-solid fa-star" onclick="submitRate(5)"></i>
            </div>
            <p style="font-size:10px; color:var(--text-light); margin-bottom:20px;">Clique sur une étoile pour noter</p>

            <button id="mGo" style="background:var(--primary); color:white; border:none; padding:16px; border-radius:18px; font-weight:bold; width:100%; font-size:16px; cursor:pointer;">Y aller maintenant</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="go('home', this)"><i class="fa-solid fa-house"></i>Accueil</div>
        <div class="nav-item" onclick="go('map', this)"><i class="fa-solid fa-map-location-dot"></i>Carte</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentDealId = null;
        let map;

        // --- SYSTÈME DE NOTATION ---
        function submitRate(note) {
            if(!currentDealId) return;
            let allRatings = JSON.parse(localStorage.getItem('user_ratings')) || {};
            allRatings[currentDealId] = note;
            localStorage.setItem('user_ratings', JSON.stringify(allRatings));
            updateStarsUI(note);
            refreshCardRatings();
        }

        function updateStarsUI(note) {
            const stars = document.querySelectorAll('#modalStars i');
            stars.forEach((s, i) => {
                s.classList.toggle('active', i < note);
            });
        }

        function refreshCardRatings() {
            let allRatings = JSON.parse(localStorage.getItem('user_ratings')) || {};
            for (let id in allRatings) {
                let badgeSpan = document.querySelector(`#rate-${id} span`);
                if(badgeSpan) badgeSpan.innerText = allRatings[id].toFixed(1);
            }
        }

        // --- NAVIGATION & MODALE ---
        function openDetails(t, e, d, lat, lng, s, id, intro = "") {
            currentDealId = id;
            document.getElementById('mEmoji').innerText = e;
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mDesc').innerText = d;
            document.getElementById('mIntro').innerText = intro;
            
            let allRatings = JSON.parse(localStorage.getItem('user_ratings')) || {};
            updateStarsUI(allRatings[id] || 0);

            // LIEN GOOGLE MAPS CORRIGÉ (SANS PAGE BLANCHE)
            document.getElementById('mGo').onclick = () => { 
                const mapsUrl = "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng;
                window.open(mapsUrl, '_blank');
            };
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeM() { document.getElementById('detailModal').style.display = 'none'; }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('th', document.body.classList.contains('dark'));
            document.getElementById('theme-icon').className = document.body.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function searchDeals() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? "flex" : "none";
            });
        }

        function filterCat(c, b) {
            document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            let favs = JSON.parse(localStorage.getItem('f')) || [];
            document.querySelectorAll('.card').forEach(k => {
                const id = k.querySelector('.fav-btn').id;
                if(c === 'fav') k.classList.toggle('hidden', !favs.includes(id));
                else k.classList.toggle('hidden', c !== 'tous' && k.dataset.cat !== c);
            });
        }

        function toggleFav(id) {
            let favs = JSON.parse(localStorage.getItem('f')) || [];
            if(favs.includes(id)) favs = favs.filter(x => x !== id);
            else favs.push(id);
            localStorage.setItem('f', JSON.stringify(favs));
            document.getElementById(id).classList.toggle('is-fav');
        }

        function go(p, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-content').style.display = (p === 'home' ? 'block' : 'none');
            document.getElementById('map-page').style.display = (p === 'map' ? 'block' : 'none');
            if(p==='map') {
                setTimeout(() => {
                    if(!map) {
                        map = L.map('map').setView([46.123, 3.425], 14);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    }
                }, 200);
            }
        }

        window.onload = () => {
            if(localStorage.getItem('th') === 'true') {
                document.body.classList.add('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            }
            let favs = JSON.parse(localStorage.getItem('f')) || [];
            favs.forEach(id => { if(document.getElementById(id)) document.getElementById(id).classList.add('is-fav'); });
            refreshCardRatings();
        };
    </script>
</body>
</html>
