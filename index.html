<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vichy'U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5d5fef;
            --bg: #f8f9fe;
            --text: #2d3436;
            --heart-red: #ff4757;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header { 
            background: var(--primary); 
            padding: 40px 20px 60px; 
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; 
            color: white; 
            position: relative; 
            z-index: 1001; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-img { height: 45px; margin-bottom: 5px; }

        .search-bar { background: white; margin: 20px 0 -80px; padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .search-bar input { border: none; width: 100%; margin-left: 10px; font-size: 16px; outline: none; color: var(--text); }

        .container { padding: 95px 15px 20px; }

        /* --- CARTE & BOUTON LOC --- */
        #map-page { display: none; height: 75vh; width: 100%; position: relative; }
        #map { height: 100%; width: 100%; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .locate-btn {
            position: absolute; bottom: 20px; right: 20px;
            z-index: 1002; background: white; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: var(--primary); font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- SLIDER & FILTRES --- */
        .ad-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .ad-slider::-webkit-scrollbar { display: none; }
        .ad-banner { flex: 0 0 100%; scroll-snap-align: center; border-radius: 25px; padding: 20px; color: white; display: flex; align-items: center; gap: 15px; }
        
        .categories { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; scrollbar-width: none; }
        .category-btn {
            flex: 0 0 85px; background: white; border: none; padding: 12px 2px; border-radius: 15px;
            font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .category-btn.active { background-color: var(--primary); color: white; }

        /* --- CARTES --- */
        .card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card.hidden { display: none !important; }
        .card-emoji { font-size: 30px; background: #f0f1ff; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 18px; }

        /* --- NAV BAS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #b2bec3; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        .fav-btn { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #ddd; cursor: pointer; }
        .fav-btn.is-fav { color: var(--heart-red); }
        #empty-msg { text-align: center; color: var(--light-text); margin-top: 50px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="page-title">Vichy'U 🎓</h1>
        <div class="search-bar" id="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Où manger ce midi ?">
        </div>
    </div>

    <div class="container">
        <div id="map-page">
            <div id="map"></div>
            <button class="locate-btn" onclick="locateUser()"><i class="fa-solid fa-location-crosshairs"></i></button>
        </div>

        <div id="home-content">
            <div id="ad-container" class="ad-slider">
                <div class="ad-banner" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);">
                    <div style="font-size: 35px;">🔥</div>
                    <div class="ad-content"><h4>O'Tacos</h4><p>Le 3ème offert !</p></div>
                </div>
            </div>

            <div class="categories" id="filter-container">
                <button class="category-btn active" onclick="filterDeals('tous', this)">🚀<span>Tous</span></button>
                <button class="category-btn" onclick="filterDeals('restos', this)">🍔<span>Restos</span></button>
                <button class="category-btn" onclick="filterDeals('loisirs', this)">🍿<span>Loisirs</span></button>
                <button class="category-btn" onclick="filterDeals('sport', this)">🏊<span>Sport</span></button>
            </div>

            <div id="deals-list">
                <div class="card" id="deal-1" data-cat="restos">
                    <div class="card-emoji">🍕</div>
                    <div class="card-info"><h3>Le Daily</h3><p>Formule Lardy : 8.50€</p></div>
                    <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-1')"></i>
                </div>
                <div class="card" id="deal-2" data-cat="sport">
                    <div class="card-emoji">🧗</div>
                    <div class="card-info"><h3>Vertical Limit</h3><p>Accès réduit étudiant</p></div>
                    <i class="fa-solid fa-heart fav-btn" onclick="toggleFavorite('deal-2')"></i>
                </div>
            </div>
            <div id="empty-msg">Aucun favori pour l'instant... 💔</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')"><i class="fa-solid fa-house"></i><span>Accueil</span></div>
        <div class="nav-item" id="nav-map" onclick="showPage('map')"><i class="fa-solid fa-map-location-dot"></i><span>Carte</span></div>
        <div class="nav-item" id="nav-fav" onclick="showPage('fav')"><i class="fa-solid fa-heart"></i><span>Favoris</span></div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let userMarker;

        function initMap() {
            if (!map) {
                map = L.map('map').setView([46.1215, 3.4275], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                // Marqueurs des restos
                L.marker([46.1218, 3.4278]).addTo(map).bindPopup('<b>Le Daily</b><br>Promo étudiant !');
                L.marker([46.1250, 3.4220]).addTo(map).bindPopup('<b>O\'Tacos</b><br>Offre spéciale');
            }
        }

        // --- FONCTION ME LOCALISER ---
        function locateUser() {
            if (!navigator.geolocation) {
                alert("La géolocalisation n'est pas supportée par votre navigateur");
                return;
            }

            map.locate({setView: true, maxZoom: 16});

            map.on('locationfound', function(e) {
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker(e.latlng, {
                    radius: 10,
                    fillColor: "#5d5fef",
                    color: "white",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup("Tu es ici !").openPopup();
            });

            map.on('locationerror', function() {
                alert("Impossible de trouver votre position.");
            });
        }

        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('map-page').style.display = 'none';
            document.getElementById('search-container').style.display = 'flex';
            document.getElementById('empty-msg').style.display = 'none';

            if (page === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('home-content').style.display = 'block';
                document.getElementById('page-title').innerText = "Vichy'U 🎓";
                document.querySelectorAll('.card').forEach(c => c.classList.remove('hidden'));
            } 
            else if (page === 'map') {
                document.getElementById('nav-map').classList.add('active');
                document.getElementById('map-page').style.display = 'block';
                document.getElementById('search-container').style.display = 'none';
                document.getElementById('page-title').innerText = "Vichy à la loupe 📍";
                setTimeout(() => {
                    initMap();
                    map.invalidateSize(); // Force la carte à se rafraîchir
                }, 100);
            } 
            else if (page === 'fav') {
                document.getElementById('nav-fav').classList.add('active');
                document.getElementById('home-content').style.display = 'block';
                document.getElementById('page-title').innerText = "Mes Favoris ❤️";
                const favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
                let hasFavs = false;
                document.querySelectorAll('.card').forEach(card => {
                    if (favs.includes(card.id)) { card.classList.remove('hidden'); hasFavs = true; }
                    else { card.classList.add('hidden'); }
                });
                document.getElementById('empty-msg').style.display = hasFavs ? 'none' : 'block';
            }
        }

        function toggleFavorite(id) {
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            const heart = document.querySelector(`#${id} .fav-btn`);
            if (favs.includes(id)) {
                favs = favs.filter(item => item !== id);
                heart.classList.remove('is-fav');
                if(document.getElementById('nav-fav').classList.contains('active')) document.getElementById(id).classList.add('hidden');
            } else {
                favs.push(id);
                heart.classList.add('is-fav');
            }
            localStorage.setItem('vichyu_favs', JSON.stringify(favs));
        }

        window.onload = function() {
            let favs = JSON.parse(localStorage.getItem('vichyu_favs')) || [];
            favs.forEach(id => {
                const heart = document.querySelector(`#${id} .fav-btn`);
                if (heart) heart.classList.add('is-fav');
            });
        };
    </script>
</body>
</html>
